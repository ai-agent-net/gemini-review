name: "Gemini AI PR Reviewer"
description: "Full-cycle AI code review including checkout"
author: "Val-d-emar"

inputs:
  gemini_api_key:
    description: "API Key from Google AI Studio OR Service Account JSON for Vertex AI"
    required: true
  use_vertexapi_key:
    description: "Set to true if using Vertex AI (GCP Service Account JSON)"
    required: false
    default: "false"
  github_token:
    description: "GitHub PAT for the reviewer account (needs repo scope)"
    required: false
    default: ${{ github.token }}
  review_prompt:
    description: "Custom prompt for the AI"
    required: false
    default: "You are an expert software engineer. Review this git diff for bugs,
      security, and style. Provide feedback in Markdown. If okay,
      approve PR including the text 'RESUME: APPROVE' to end of your response."
  review_language:
    description: "Language for the AI (e.g. 'English', 'Spanish')"
    required: false
    default: "English"
  approval_required:
    description: "Require approval from the reviewer (uses --approve or --request-changes)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Checkout Code
      env:
        GITHUB_TOKEN: ${{ inputs.inputs.github_token }}
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ inputs.github_token }}

    - name: Authenticate to Google Cloud
      if: ${{ inputs.use_vertexapi_key == 'true' }}
      uses: google-github-actions/auth@v2
      with:
        credentials_json: "${{ inputs.gemini_api_key }}"

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "24"

    - name: Install Gemini CLI
      run: npm install -g @google/gemini-cli
      shell: bash

    - name: Generate PR Diff
      run: |
        git diff origin/${{ github.event.pull_request.base.ref }}...origin/${{ github.event.pull_request.head.ref }} > pr_diff.txt
      shell: bash

    - name: Run Gemini Review
      env:
        GOOGLE_GENAI_USE_VERTEXAI: ${{ inputs.use_vertexapi_key }}
        GEMINI_API_KEY: ${{ inputs.use_vertexapi_key == 'false' && inputs.gemini_api_key || '' }}
      run: |
        gemini prompt "${{ inputs.review_prompt }}. Use ${{ inputs.review_language }} language for answer." pr_diff.txt > review_result.md

        if [ "${{ inputs.approval_required }}" == "true" ]; then
          if grep -iq "RESUME: APPROVE" review_result.md; then
            echo "APPROVE" > review_status.txt
          else
            echo "REJECT" > review_status.txt
          fi
        fi
      shell: bash

    - name: Submit PR Review
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        if [ "${{ inputs.approval_required }}" == "true" ]; then
          RESUME=$(cat review_status.txt)
          if [ "$RESUME" == "APPROVE" ]; then
            gh pr review ${{ github.event.pull_request.number }} \
              -R ${{ github.repository }} \
              --approve \
              --body-file review_result.md
          else
            gh pr review ${{ github.event.pull_request.number }} \
              -R ${{ github.repository }} \
              --request-changes \
              --body-file review_result.md
          fi
        else
          gh pr review ${{ github.event.pull_request.number }} \
            -R ${{ github.repository }} \
            --comment \
            --body-file review_result.md
        fi
      shell: bash

branding:
  icon: 'code'
  color: 'blue'
  